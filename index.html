<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Regal Chess</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="ambient-shape ambient-one" aria-hidden="true"></div>
    <div class="ambient-shape ambient-two" aria-hidden="true"></div>

    <main class="app-shell">
      <header class="hero">
        <div class="hero-text">
          <p class="eyebrow">Classic Rules. Modern Presentation.</p>
          <h1>Regal Chess</h1>
          <p id="opening-name" class="opening-name"></p>
        </div>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">☽</button>
      </header>

      <section class="game-layout">
        <section class="board-panel" aria-label="Chess Board Panel">
          <div class="board-frame">
            <div id="board" class="board" role="grid" aria-label="Chess board"></div>
          </div>

          <div id="browse-bar" class="browse-bar hidden" role="toolbar" aria-label="History navigation">
            <span class="browse-label">History</span>
            <button id="browse-first" type="button" title="First move">⏮</button>
            <button id="browse-prev"  type="button" title="Previous move">◀</button>
            <span id="browse-counter" class="browse-counter">0 / 0</span>
            <button id="browse-next"  type="button" title="Next move">▶</button>
            <button id="browse-last"  type="button" title="Last move">⏭</button>
            <button id="browse-exit"  type="button" class="browse-exit">Return to game</button>
          </div>

          <div class="status-card">
            <p id="status-line" class="status-line">White to move.</p>
            <p id="meta-line"   class="meta-line">Move 1</p>
          </div>

          <div class="export-card">
            <div class="button-row two">
              <button id="copy-fen" type="button">Copy FEN</button>
              <button id="copy-pgn" type="button">Copy PGN</button>
            </div>
          </div>
        </section>

        <aside class="control-panel">
          <section id="clock-stack" class="clock-stack">
            <div id="clock-black" class="clock-card">
              <p class="clock-label">Black</p>
              <p id="time-black" class="clock-time">05:00</p>
            </div>
            <div id="clock-white" class="clock-card active">
              <p class="clock-label">White</p>
              <p id="time-white" class="clock-time">05:00</p>
            </div>
          </section>

          <section class="controls-card">
            <label for="game-mode">Game Mode</label>
            <select id="game-mode">
              <option value="local" selected>Local 2 Player</option>
              <option value="ai">Vs Computer</option>
              <option value="online">Online Multiplayer</option>
            </select>

            <div id="time-control-wrap" class="sub-controls">
              <label for="time-control">Time Control</label>
              <select id="time-control">
                <option value="untimed">Untimed</option>
                <option value="180+2">3 | 2</option>
                <option value="300+0" selected>5 | 0</option>
                <option value="600+5">10 | 5</option>
                <option value="900+10">15 | 10</option>
              </select>
            </div>

            <div id="ai-controls" class="sub-controls hidden">
              <label for="ai-difficulty">AI Difficulty</label>
              <select id="ai-difficulty">
                <option value="easy">Easy</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard</option>
              </select>

              <label for="human-color">Play As</label>
              <select id="human-color">
                <option value="w" selected>White</option>
                <option value="b">Black</option>
                <option value="random">Random</option>
              </select>
            </div>

            <div id="online-controls" class="sub-controls hidden">
              <label for="online-room">Room Code</label>
              <input id="online-room" type="text" placeholder="e.g. CHESS42" maxlength="8" />

              <label for="online-color">Preferred Color</label>
              <select id="online-color">
                <option value="auto" selected>Auto Assign</option>
                <option value="w">White</option>
                <option value="b">Black</option>
              </select>

              <div class="button-row two">
                <button id="online-connect"    type="button">Connect</button>
                <button id="online-disconnect" type="button">Leave</button>
              </div>

              <button id="copy-room-link" type="button" class="full-width-btn">Copy Room Link</button>

              <p id="online-status" class="inline-status">Not connected.</p>

              <div id="draw-offer-ui" class="draw-offer-ui hidden">
                <p class="draw-offer-msg">Opponent offers a draw</p>
                <div class="button-row two">
                  <button id="draw-accept"  type="button">Accept</button>
                  <button id="draw-decline" type="button">Decline</button>
                </div>
              </div>
            </div>

            <div class="button-row">
              <button id="new-game" type="button">New Game</button>
              <button id="undo"     type="button">Undo</button>
              <button id="flip"     type="button">Flip Board</button>
            </div>
            <div class="button-row two">
              <button id="resign"     type="button">Resign</button>
              <button id="offer-draw" type="button">Offer Draw</button>
            </div>
          </section>

          <section class="captures-card">
            <h2>Captured Pieces</h2>
            <div class="capture-row">
              <p>White captured</p>
              <div id="captured-white" class="capture-list" aria-live="polite"></div>
            </div>
            <div class="capture-row">
              <p>Black captured</p>
              <div id="captured-black" class="capture-list" aria-live="polite"></div>
            </div>
          </section>

          <section class="history-card">
            <h2>Move History</h2>
            <ol id="move-list"></ol>
          </section>
        </aside>
      </section>
    </main>

    <!-- Promotion Modal -->
    <div
      id="promotion-modal"
      class="promotion-modal hidden"
      role="dialog"
      aria-modal="true"
      aria-label="Choose promotion piece"
    >
      <div class="promotion-content">
        <h2>Choose Promotion</h2>
        <div class="promotion-options">
          <button type="button" data-piece="q"></button>
          <button type="button" data-piece="r"></button>
          <button type="button" data-piece="b"></button>
          <button type="button" data-piece="n"></button>
        </div>
      </div>
    </div>

    <!-- Game Over Modal -->
    <div
      id="game-over-modal"
      class="game-over-modal hidden"
      role="dialog"
      aria-modal="true"
      aria-label="Game over"
    >
      <div class="game-over-content">
        <div id="game-over-icon" class="game-over-icon">♔</div>
        <h2 id="game-over-title" class="game-over-title">Game Over</h2>
        <p  id="game-over-sub"   class="game-over-sub"></p>
        <div class="button-row two">
          <button id="game-over-new"   type="button">New Game</button>
          <button id="game-over-close" type="button">Close</button>
        </div>
      </div>
    </div>

    <script src="engine-core.js"></script>
    <script src="app.js"></script>
  </body>
</html>
